# ═══════════════════════════════════════════════════════════════════════════════
# UW CoPilot — Comprehensive Evaluation Dataset (150+ questions)
#
# Coverage:
#   - Document retrieval: 90 questions across 16 categories (~6 per category)
#   - Structured data (NL-to-SQL): 35 questions across 8 Delta tables
#   - RBAC enforcement: 12 questions testing role restrictions
#   - Guardrail triggers: 8 questions testing safety boundaries
#   - Edge cases & mixed intent: 10 questions
#
# Fields:
#   id:               Unique question identifier
#   question:         Natural language question
#   category:         Target document category or "structured" or "guardrail"
#   intent:           Expected routing (hybrid, keyword, sql, guardrail)
#   role:             RBAC role to test with (default: underwriter)
#   expected_keywords: Words/phrases that MUST appear in a good response
#   should_not_contain: Words/phrases that should NOT appear (for guardrails)
#   difficulty:       easy, medium, hard
# ═══════════════════════════════════════════════════════════════════════════════

